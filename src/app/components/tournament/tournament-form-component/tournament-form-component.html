<div class="container mt-4">

    <!-- TÍTULO -->
    <h2 class="text-green-custom text-center fw-bold mb-3">
          {{ isEditMode ? 'Edit Tournament' : ' Register New Tournament' }}

    </h2>

    <!-- CONTAINER DO FORM -->
    <div class="bg-light border rounded p-4 rounded-2 shadow">

        <form [formGroup]="formGroupTournaments">

            <!-- LINHA 1 -->
            <div class="row mb-3">

                <div class="col-md-6">
                    <label class="form-label">Team 1</label>
                    <input type="text" class="form-control" formControlName="fifaCode1" placeholder="Enter Team 1 FIFA code">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Team 2</label>
                    <input type="text" class="form-control" formControlName="fifaCode2" placeholder="Enter Team 2 FIFA Code">
                </div>
            </div>

<div class="row mb-3">

  <!-- DATE (MENOR) -->
  <div class="col-md-3">
    <label class="form-label">Date</label>
    <input type="text" class="form-control" formControlName="date">
  </div>

  <!-- LOCAL (MAIOR) -->
  <div class="col-md-5">
    <label class="form-label">Local</label>
    <input type="text" class="form-control" formControlName="location" placeholder="Enter the Tournament local">
  </div>

  <!-- START TIME (MAIOR) -->
  <div class="col-md-4">
    <label class="form-label">Start time</label>
    <input type="text" class="form-control" formControlName="time">
  </div>

</div>

            <!-- BOTÃO CENTRALIZADO -->
            <div class="d-flex justify-content-center mt-5">
                <button (click)="save()" type="submit" class="btn btn-outline-green-custom px-4">
  {{ isEditMode ? 'Edit Tournament' : ' Register Tournament' }}

                </button>
            </div>

        </form>

    </div>
</div>
