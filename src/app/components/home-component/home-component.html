<!-- HERO SECTION -->
<section class="bg-green-custom text-white py-5">

  <div class="container text-center py-5">

    <!-- TÍTULO -->
    <h1 class="display-4 fw-bold mb-3">
      Build Your Cup Championship
    </h1>

    <p class="lead mb-4">
      Organize teams, manage tournaments and track every match in one place.
    </p>

    <!-- BOTÕES -->
    <div class="d-flex flex-column align-items-center gap-2">

<a class="btn btn-yellow-custom text-dark px-4"
   routerLink="/tournaments/new">
  Organize Tournament
</a>

<a class="btn btn-outline-light px-4 mt-4"
   routerLink="/teams/new">
  Register Team
</a>

    </div>

  </div>
</section>


<!-- STATS SECTION -->
<section class="bg-white py-5">

  <div class="container">

    <h2 class="text-center fw-bold mb-5 text-green-custom">
      Platform Statistics
    </h2>

    <div class="row g-4">

      <!-- TEAMS -->
      <div class="col-md-4 ">
        <div class="card shadow border-0 rounded-2 text-center p-4 ">

          <h3 class="fw-bold text-green-custom">
            {{Teams().length}}
          </h3>

          <p class="mb-0 text-muted">
            Registered Teams
          </p>

        </div>
      </div>

      <!-- TOURNAMENTS -->
      <div class="col-md-4">
        <div class="card shadow border-0 rounded-2 text-center p-4">

          <h3 class="fw-bold text-green-custom">
            {{Tournaments().length}}
          </h3>

          <p class="mb-0 text-muted">
            Created Tournaments
          </p>

        </div>
      </div>

      <!-- NEXT TOURNAMENT -->
      <div class="col-md-4">
        <div class="card shadow border-0 rounded-2 text-center p-4">

          <h5 class="fw-bold text-dark">
            Next Tournament
          </h5>

          <p class="mb-0 text-muted">
            Brazil vs Argentina - 2026-06-10
          </p>

        </div>
      </div>

    </div>

  </div>
</section>
